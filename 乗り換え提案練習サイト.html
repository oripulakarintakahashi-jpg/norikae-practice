<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乗り換え提案 練習サイト</title>
<style>
:root{
  --ink:#1a1d21;--ink2:#5a6068;--ink3:#9298a0;
  --bg:#f7f7f5;--surface:#ffffff;--line:#e4e4e0;
  --sb:#0071c5;--sb-light:#e8f3fc;--ym:#e53935;
  --ok:#1d9e75;--ng:#d85a30;--warn:#ba7517;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.6}
.topbar{display:flex;align-items:center;gap:10px;padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;color:#fff}
.b-ym{background:var(--ym)}.b-sb{background:var(--sb)}
.topbar h1{font-size:16px;font-weight:600;flex:1}
.topbar .note{font-size:12px;color:var(--ink3)}
.layout{display:flex;min-height:calc(100vh - 57px)}
.sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--line);padding:14px 10px;overflow-y:auto;max-height:calc(100vh - 57px);position:sticky;top:57px}
.sec-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.06em;padding:6px 10px 4px}
.cbtn{display:block;width:100%;text-align:left;background:transparent;border:none;border-left:3px solid transparent;border-radius:0 8px 8px 0;padding:10px 12px;cursor:pointer;font-size:13px;color:var(--ink2);line-height:1.45;margin-bottom:2px;font-family:inherit}
.cbtn:hover{background:var(--bg)}
.cbtn.on{background:var(--sb-light);color:var(--ink);font-weight:600;border-left-color:var(--sb)}
.cbtn small{display:block;font-size:11px;font-weight:400;color:var(--ink3)}
.cbtn .done{color:var(--ok);font-size:11px;font-weight:600}
.saku{margin:4px 8px 8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:12px;line-height:1.6;color:var(--ink2)}
.saku b{color:var(--ink);font-weight:600}
.main{flex:1;padding:22px 26px;overflow-y:auto;max-width:1150px}
.case-title{font-size:18px;font-weight:600;margin-bottom:16px}
h2.sec{font-size:13px;font-weight:600;color:var(--ink2);margin:0 0 10px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;margin-bottom:18px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;display:inline-block;margin-bottom:7px}
.t-docomo{background:#e8f0fe;color:#1a56db}
.t-au{background:#fff3cd;color:#92400e}
.t-sb{background:#dbeafe;color:#1d4ed8}
.t-rakuten{background:#fce7f3;color:#9d174d}
.t-uq{background:#d1fae5;color:#065f46}
.t-iij{background:#ede9fe;color:#5b21b6}
.t-net{background:#f1f5f9;color:#475569}
.who{font-size:13px;font-weight:600;margin-bottom:7px}
.row{display:flex;justify-content:space-between;gap:6px;font-size:12px;margin-bottom:3px}
.rk{color:var(--ink3);flex-shrink:0}
.rv{font-weight:500;text-align:right}
.sub{font-size:11px;color:var(--ink3);margin-top:6px;line-height:1.45;border-top:1px dashed var(--line);padding-top:6px}
.inforow{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.sbox{flex:1;min-width:220px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:14px}
.sbox.warn{border-left:3px solid var(--warn)}
.stitle{font-size:12px;font-weight:600;margin-bottom:7px}
.sbody{font-size:13px;color:var(--ink2);line-height:1.7}
.agrid{display:grid;grid-template-columns:1fr;gap:5px}
.aitem{font-size:12px;display:flex;align-items:center;gap:6px;color:var(--ink2)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-ok{background:var(--ok)}.d-ng{background:var(--ng)}.d-q{background:var(--warn)}
/* ===== 回答フォーム ===== */
.azone{background:var(--surface);border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px}
.ahead{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg);border-bottom:1px solid var(--line);flex-wrap:wrap}
.ahtitle{font-size:13px;font-weight:600}
.btns{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.savestat{font-size:11px;color:var(--ink3)}
.savestat.ok{color:var(--ok)}
button.act{font-family:inherit;background:var(--sb);color:#fff;border:none;border-radius:7px;padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer}
button.act:hover{background:#005a9e}
button.ghost{font-family:inherit;background:transparent;color:var(--ink2);border:1px solid var(--line);border-radius:7px;padding:8px 14px;font-size:13px;cursor:pointer}
button.ghost:hover{background:var(--bg)}
button:disabled{opacity:.5;cursor:not-allowed}
.formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;padding:14px 16px;border-bottom:1px solid var(--line)}
.fblock{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px}
.fblock-title{font-size:12px;font-weight:600;margin-bottom:9px;color:var(--sb)}
.fl{font-size:11px;color:var(--ink2);margin:7px 0 3px;font-weight:500}
.fl:first-of-type{margin-top:0}
select,input[type=number],input[type=text]{width:100%;border:1px solid var(--line);border-radius:6px;padding:7px 8px;font-size:12px;font-family:inherit;background:var(--surface);color:var(--ink)}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--sb);box-shadow:0 0 0 2px rgba(0,113,197,.12)}
.yen{display:flex;align-items:center;gap:4px}
.yen span{font-size:11px;color:var(--ink3)}
.reasonarea{padding:14px 16px;border-bottom:1px solid var(--line)}
.memlabel{font-size:12px;color:var(--ink2);margin-bottom:6px;font-weight:500}
textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:13px;font-family:inherit;resize:vertical;min-height:80px;background:var(--surface);color:var(--ink);line-height:1.6}
/* ===== 解答 ===== */
.ansarea{padding:14px 16px;border-bottom:1px solid var(--line)}
.anslabel{font-size:12px;font-weight:600;color:var(--ok);margin-bottom:10px}
.ansbody,.aibody{font-size:13px;line-height:1.75}
.ansbody table,.aibody table{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px}
.ansbody th,.aibody th{background:var(--bg);padding:7px 9px;text-align:left;font-weight:600;border:1px solid var(--line)}
.ansbody td,.aibody td{padding:7px 9px;border:1px solid var(--line);vertical-align:top}
.ansbody h3,.aibody h3{font-size:14px;font-weight:600;margin:16px 0 6px;padding-left:8px;border-left:3px solid var(--sb)}
.ansbody h3:first-child{margin-top:0}
.ansbody ul,.aibody ul{padding-left:20px;margin:6px 0}
.ansbody li,.aibody li{margin-bottom:3px}
.reason-box{background:#f0f7f1;border:1px solid #cfe5d2;border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px}
.reason-box b{display:block;margin-bottom:5px;color:var(--ok)}
.point{background:var(--sb-light);border-radius:8px;padding:11px 14px;margin-top:12px;font-size:12px}
.point b{display:block;margin-bottom:4px}
.caution{font-size:11px;color:var(--ink3);margin-top:10px;padding-top:8px;border-top:1px dashed var(--line)}
.loading{display:flex;align-items:center;gap:8px;color:var(--ink2);padding:10px 0;font-size:13px}
.dots{display:inline-flex;gap:4px}
.dots span{width:6px;height:6px;border-radius:50%;background:var(--sb);animation:bk 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bk{0%,80%,100%{opacity:.2}40%{opacity:1}}
.hint{font-size:12px;color:var(--ink3);text-align:center;padding:4px 0 30px}
.err{color:var(--ng);font-size:13px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-overlay.open{display:flex;align-items:flex-start;justify-content:center;padding:20px 12px}
.modal-box{background:var(--surface);border-radius:14px;width:100%;max-width:860px;margin:auto;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line);background:var(--bg)}
.modal-head h2{font-size:15px;font-weight:600}
.modal-tabs{display:flex;gap:4px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--line);background:var(--bg)}
.modal-tab{flex-shrink:0;font-family:inherit;font-size:12px;padding:5px 11px;border:1px solid var(--line);border-radius:16px;background:var(--surface);cursor:pointer;color:var(--ink2)}
.modal-tab.on{background:var(--sb);color:#fff;border-color:var(--sb)}
.modal-body{padding:16px}
.edit-label{font-size:12px;font-weight:600;color:var(--ink2);margin:14px 0 5px}
.edit-label:first-child{margin-top:0}
.edit-ta{width:100%;min-height:130px;border:1px solid var(--line);border-radius:8px;padding:11px;font-size:13px;font-family:inherit;resize:vertical;background:var(--surface);color:var(--ink);line-height:1.6}
.edit-ta:focus{outline:none;border-color:var(--sb);box-shadow:0 0 0 3px rgba(0,113,197,.1)}
.modal-foot{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 16px;border-top:1px solid var(--line);background:var(--bg)}
.edit-stat{font-size:12px;color:var(--ink3);flex:1}
.edit-stat.custom{color:var(--warn);font-weight:600}
.edit-section{border-top:1px solid var(--line);margin-top:14px;padding-top:14px}
.edit-section-title{font-size:13px;font-weight:600;margin-bottom:10px;color:var(--sb)}
.edit-phone-block{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px}
.edit-row{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.edit-row label{font-size:11px;color:var(--ink2);display:block;margin-bottom:3px}
.edit-row .ef{flex:1;min-width:110px}
.edit-row input{width:100%;border:1px solid var(--line);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit}
.edit-area-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.edit-area-row input[type=text]{flex:1;border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px}
.edit-area-row select{border:1px solid var(--line);border-radius:6px;padding:5px 8px;font-size:12px}
.edit-quiz-block{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px;margin-bottom:8px}
.edit-quiz-block textarea{width:100%;border:1px solid var(--line);border-radius:6px;padding:7px;font-size:12px;font-family:inherit;min-height:50px}
.btn-tiny{font-family:inherit;font-size:11px;padding:4px 9px;border:1px solid var(--line);border-radius:6px;background:var(--surface);cursor:pointer;color:var(--ink2)}
.btn-tiny:hover{background:var(--bg)}
.btn-tiny.danger{color:var(--ng);border-color:var(--ng)}
.report-case{border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:16px}
.report-case h3{font-size:14px;margin-bottom:10px;padding-left:8px;border-left:3px solid var(--sb)}
.report-table{width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px}
.report-table th,.report-table td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
.report-table th{background:var(--bg);white-space:nowrap}
.empty{color:var(--ink3);font-style:italic}
.fb-ok{color:var(--ok);font-weight:600}
.fb-ng{color:var(--ng);font-weight:600}
.report-reason{font-size:12px;background:var(--bg);border-radius:8px;padding:10px;margin-bottom:8px;line-height:1.6;white-space:pre-wrap}
.report-quiz{font-size:12px}
.report-quiz ul{padding-left:18px;margin:6px 0}
.report-quiz li{margin-bottom:4px;line-height:1.5}
.report-summary{background:var(--sb-light);border-radius:10px;padding:14px;margin-bottom:16px}
.report-summary h2{font-size:15px;margin-bottom:8px}
.report-summary table{width:100%;font-size:12px;border-collapse:collapse}
.report-summary td{padding:4px 8px}
.report-empty{color:var(--ink3);text-align:center;padding:40px 0;font-size:13px}
@media print{
  body *:not(#reportModal):not(#reportModal *){display:none !important}
  #reportModal{display:block !important;position:static !important;background:none !important;padding:0 !important}
  #reportModal .modal-box{box-shadow:none !important;max-width:100% !important;border-radius:0 !important}
  #reportModal .modal-head,#reportModal .modal-foot{display:none !important}
  .report-case{break-inside:avoid}
}
.qitem{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.qtext{font-size:13px;margin-bottom:7px;line-height:1.55}
.qbtns{display:flex;gap:8px}
.qbtn{font-family:inherit;width:44px;height:36px;border:1px solid var(--line);border-radius:8px;background:var(--surface);font-size:16px;cursor:pointer;color:var(--ink2)}
.qbtn:hover{border-color:var(--sb)}
.qbtn.qsel{background:var(--sb);color:#fff;border-color:var(--sb)}
.qres{font-size:12px;margin-top:7px;line-height:1.55;padding:7px 10px;border-radius:6px}
.qok{background:#e8f5ec;color:var(--ok)}
.qng{background:#fdeeea;color:var(--ng)}
.ansbody{overflow-x:auto}
@media(max-width:760px){
  .layout{flex-direction:column}
  .topbar{padding:10px 14px;position:static}
  .topbar h1{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .topbar .note{display:none}
  .sidebar{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--line);display:flex;overflow-x:auto;padding:8px;position:static;max-height:none}
  .sidebar .sec-label,.sidebar .saku{display:none}
  .cbtn{white-space:nowrap;border-left:none;border-bottom:3px solid transparent;border-radius:8px 8px 0 0}
  .cbtn.on{border-left:none;border-bottom-color:var(--sb)}
  .main{padding:14px}
  .formgrid{grid-template-columns:1fr}
  select,input[type=number],input[type=text],textarea{font-size:16px;padding:10px}
  button.act,button.ghost{padding:10px 16px;font-size:14px}
  .qbtn{width:52px;height:44px}
  .ansbody table{min-width:540px}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="badge b-ym">YM</span><span class="badge b-sb">SB</span>
  <h1>乗り換え提案 練習サイト</h1>
  <span class="note" style="white-space:nowrap">2026年6月施策反映</span>
  <button class="ghost" style="font-size:12px;padding:5px 10px;white-space:nowrap" onclick="openEditor()">✏️ 解答編集</button>
  <button class="ghost" style="font-size:12px;padding:5px 10px;white-space:nowrap" onclick="openReport()">📋 回答まとめ</button>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main"></main>
</div>

<script>
var cur = -1;
var showAns = {};
var memCache = {};      // ストレージ不可時のフォールバック
var saveTimer = null;
var storageOK = (typeof window.storage === 'object' && window.storage && typeof window.storage.set === 'function');

var PLAN_OPTS = ['（未選択）','変更なし・持ち込み','YM シンプル3 S（5GB）','YM シンプル3 M（30GB）','YM シンプル3 L（35GB）','SB ペイトク2（無制限）','SB テイガク無制限','SB ミニフィット2（〜2GB）','SB ミニフィット2（〜5GB）','SB スマホデビュープラン＋ ライト（4GB）','SB スマホデビュープラン＋ ベーシック（20GB）','その他（施策欄に記入）'];
var CALL_OPTS = ['（通話なし）','5分かけ放題','10分かけ放題','24時間かけ放題'];
var CARD_OPTS = ['（未選択）','つけない','PayPayカード ノーマル','PayPayカード ゴールド'];
var NET_OPTS  = ['（未選択）','変更なし','SoftBank光 1ギガ（マンション）','SoftBank光 1ギガ（戸建て）','SoftBank光 10ギガ','SoftBank Air','その他'];
var KOUJI_OPTS = ['（未選択）','工事あり','工事なし','工事不要（Air）'];
var KOUJITYPE_OPTS = ['（未選択）','事業者変更（事変）','転用'];
var HOTEN_OPTS = ['（未選択）','補填あり（あんしん乗り換え等）','補填なし','対象外（違約金・残債なし）'];
var NETSAKU_OPTS = ['（未選択）','KD20','KD30','その他','なし'];
var HOW_OPTS  = ['（未選択）','事業者変更（事変）','解約新規','新規','転用','変更なし'];


/* ============ 解答データ（構造化形式） ============ */
// 各ケースの解答はパターンの配列。パターンは {title, reason, phones:[{who,plan,min,disc,saku}], net:{plan,fee,how,saku}, points} の構造
// phones配列はCASES[i].phonesと同順。フォームから編集可能。

var ANS_DATA = [

/* ==============================
   ケース1｜ドコモ家族3人
   前提：NURO光維持（固定電話込→おうち割光セット対象）
         子は返却P 12か月目→SIMのみ一択（24か月支払い必須）
         父iPhone14 3年前Apple一括・バッテリー78%
   ============================== */
{patterns:[
  {
    title:"パターンA：父・母も端末ごと乗り換え（1円端末＋おうち割フル活用）",
    reason:"NURO光は固定電話（NURO光でんわ）込みのためおうち割光セット対象。おうち割セット割（▲1,650円）が父・母・子の各回線につく。子は返却P 12か月目のためSIMのみ一択。父はバッテリー78%で劣化目安を超えており端末更新を訴求。",
    phones:[
      {who:"父（50代）",plan:"YM シンプル3 S（5GB）",min:"1,298円",disc:"おうち割光セット(A)▲1,650円＋PayPayカード割▲330円",saku:"iPhone16e 1円/月×24（MNP・特典利用料なし）"},
      {who:"母（50代）",plan:"YM シンプル3 S（5GB）",min:"1,298円",disc:"おうち割光セット(A)▲1,650円＋PayPayカード割▲330円",saku:"AQUOS wish5 一括1円（MNP）or 持ち込み（sense4は2020年キャリア購入→SIMロック解除確認）"},
      {who:"子（17歳）",plan:"YM シンプル3 M（30GB）",min:"2,398円",disc:"おうち割光セット(A)▲1,650円＋PayPayカード割▲330円",saku:"SIMのみ一択。おうち割施策▲16,500円＋PayPay15,000pt（M/L対象・1使用者1還元）。データ増量OP不要（おうち割施策はM/L契約でOK）"}
    ],
    net:{plan:"NURO光 維持＋おうち割光セット申込",fee:"6,600円（変更なし）",how:"変更なし",saku:"PayPayは申込月起算3か月目末日付与。セット割▲1,650円は3回線すべてに各1つ適用"},
    points:"・子＝SIMのみ一択（返却P12か月目・返却しても残債は消えない・24か月支払い必須）\n・NURO光は固定電話込みのためおうち割光セット対象→回線を動かさず家族全員に月額セット割\n・おうち割と家族割は併用不可→おうち割優先が正解\n・dカードシルバー利用中→PayPayカード新規発行を提案（▲330円/月・ゴールドなら▲550円）\n・父のバッテリー78%は劣化目安（80%以下）→端末更新の訴求機会"
  },
  {
    title:"パターンB：全員SIMのみ＋CB最大化（端末は持ち込み）",
    reason:"端末を一切動かさずMNP施策のCBを最大化するパターン。父・母はSIM単体MNP。子もSIMのみ（返却P12か月目のため端末乗り換え不可）。着地SでもSIM単体MNP施策のため入り口はM/Lで契約し翌日以降Sへ変更案内。",

/* ============ 保存・読み込み ============ */
function collect(){
  var c = CASES[cur];
  var blocks = [];
  var n = c.phones.length;
  for(var i=0;i<=n;i++){
    var b = {
      plan: val('f'+i+'_plan'),
      base: val('f'+i+'_base'),
      min:  val('f'+i+'_min'),
      mustop: val('f'+i+'_mustop')
    };
    if(i===n){
      b.how = val('f'+i+'_how');
      b.kouji = val('f'+i+'_kouji'); b.koujifee = val('f'+i+'_koujifee'); b.koujitype = val('f'+i+'_koujitype');
      b.hoten = val('f'+i+'_hoten');
      b.sakusel = val('f'+i+'_sakusel'); b.cbfee = val('f'+i+'_cbfee');
    } else {
      b.disc = val('f'+i+'_disc');
      b.callop = val('f'+i+'_callop'); b.callfee = val('f'+i+'_callfee');
      b.card = val('f'+i+'_card'); b.cardreason = val('f'+i+'_cardreason');
      b.cardfee = val('f'+i+'_cardfee'); b.cardmob = val('f'+i+'_cardmob'); b.cardhikari = val('f'+i+'_cardhikari');
      b.saku = val('f'+i+'_saku');
    }
    blocks.push(b);
  }
  return { blocks: blocks, reason: val('f_reason'), cbtotal: val('f_cbtotal'), quiz: curQuiz.slice(), _touched: true, _time: new Date().toLocaleString('ja-JP') };
}
function val(id){ var e = document.getElementById(id); return e ? e.value : ''; }

function scheduleSave(){
  clearTimeout(saveTimer);
  setStatus('未保存の変更あり…', false);
  saveTimer = setTimeout(doSave, 900);
}

function doSave(){
  var data = collect();
  memCache[cur] = data;
  if(storageOK){
    window.storage.set('kaitou:case' + cur, JSON.stringify(data)).then(function(){
      setStatus('保存済み ' + data._time, true);
      refreshSidebarDone();
    }).catch(function(){
      setStatus('保存済み（このセッション内のみ）', true);
      refreshSidebarDone();
    });
  } else {
    setStatus('保存済み（このセッション内のみ）', true);
    refreshSidebarDone();
  }
}

function loadCase(i){
  return new Promise(function(resolve){
    if(memCache[i]){ resolve(memCache[i]); return; }
    if(!storageOK){ resolve(null); return; }
    window.storage.get('kaitou:case' + i).then(function(r){
      try {
        var d = JSON.parse(r.value);
        memCache[i] = d;
        resolve(d);
      } catch(e){ resolve(null); }
    }).catch(function(){ resolve(null); });
  });
}

function setStatus(msg, ok){
  var el = document.getElementById('savestat');
  if(el){ el.textContent = msg; el.className = 'savestat' + (ok ? ' ok' : ''); }
}

function refreshSidebarDone(){
  var btns = document.querySelectorAll('.cbtn');
  btns.forEach(function(b){
    var i = parseInt(b.getAttribute('data-i'), 10);
    var has = b.querySelector('.done');
    if(memCache[i] && memCache[i]._touched && !has){
      var s = document.createElement('span');
      s.className = 'done'; s.textContent = ' ●保存済';
      var small = b.querySelector('small');
      b.insertBefore(s, small);
    }
  });
}

/* ============ メイン描画 ============ */
function selectCase(i){
  if(cur >= 0 && document.getElementById('f0_plan')){
    memCache[cur] = collect();
  }
  cur = i;
  buildSidebar();
  loadCase(i).then(function(saved){
    buildMain(saved);
    window.scrollTo(0, 0);
  });
}

function dotCls(v){ return v===true ? 'd-ok' : v===false ? 'd-ng' : 'd-q'; }
function dotMark(v){ return v===true ? '○' : v===false ? '×' : v; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function selHTML(id, opts, sel){
  var h = '<select id="' + id + '">';
  opts.forEach(function(o){
    h += '<option' + (o===sel ? ' selected' : '') + '>' + o + '</option>';
  });
  return h + '</select>';
}

function quizHTML(saved){
  curQuiz = (saved || []).slice();
  var h = '';
  getQuizData(cur).forEach(function(item, i){
    var sel = curQuiz[i];
    var res = '';
    if(sel === 'o' || sel === 'x'){
      var correct = (sel === 'o') === item.a;
      res = '<div class="qres ' + (correct ? 'qok' : 'qng') + '">' + (correct ? '○ 正解！' : '× 不正解…') + ' ' + item.exp + '</div>';
    }
    h += '<div class="qitem"><div class="qtext">Q' + (i+1) + '. ' + item.q + '</div>'
      + '<div class="qbtns">'
      + '<button type="button" class="qbtn' + (sel==='o'?' qsel':'') + '" data-q="' + i + '" data-v="o">○</button>'
      + '<button type="button" class="qbtn' + (sel==='x'?' qsel':'') + '" data-q="' + i + '" data-v="x">×</button>'
      + '</div><div id="qres' + i + '">' + res + '</div></div>';
  });
  return h;
}

function bindQuiz(){
  document.querySelectorAll('.qbtn').forEach(function(b){
    b.addEventListener('click', function(){
      var i = parseInt(b.getAttribute('data-q'), 10);
      var v = b.getAttribute('data-v');
      curQuiz[i] = v;
      var item = getQuizData(cur)[i];
      var correct = (v === 'o') === item.a;
      var res = document.getElementById('qres' + i);
      if(res) res.innerHTML = '<div class="qres ' + (correct ? 'qok' : 'qng') + '">' + (correct ? '○ 正解！' : '× 不正解…') + ' ' + item.exp + '</div>';
      b.parentElement.querySelectorAll('.qbtn').forEach(function(x){ x.classList.remove('qsel'); });
      b.classList.add('qsel');
      scheduleSave();
    });
  });
}

function updateNetFields(n){
  var saku = val('f'+n+'_sakusel');

}

function checkNetFee(n){
  var plan = val('f'+n+'_plan');
  var base = parseInt(val('f'+n+'_base'), 10);
  var fee  = parseInt(val('f'+n+'_min'), 10);
  var w = document.getElementById('f'+n+'_netwarn');
  if(!w) return;
  if(plan.indexOf('SoftBank光') === 0 && !isNaN(base) && !isNaN(fee)){
    if(fee !== base + 550){
      w.style.display = 'block';
      w.innerHTML = '⚠ <b>光は月額＝基本料金＋550円</b>（オプションパック：光BBユニット＋Wi-Fiマルチパック＋光電話。携帯がSB/YMだと3点セット550円）。' + (base+550) + '円になっているか確認！';
    } else {

function openEditor(){
  loadAllEdits().then(function(){
    editCase = cur >= 0 ? cur : 0;
    editSubTab = 'answer';
    renderEditTabs();
    renderEditSubTabs();
    renderEditBody();
    document.getElementById('editModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
}

function renderEditSubTabs(){
  var tb = document.getElementById('editSubTabs');
  if(!tb) return;
  var tabs = [['answer','✏️ 模範解答'],['customer','👤 顧客設定'],['quiz','❓ 注意事項クイズ']];
  tb.innerHTML = tabs.map(function(t){
    return '<button class="modal-tab'+(editSubTab===t[0]?' on':'')+'" data-sub="'+t[0]+'">'+t[1]+'</button>';
  }).join('');
  tb.querySelectorAll('.modal-tab').forEach(function(b){
    b.addEventListener('click', function(){
      flushEditorValues();
      editSubTab = b.getAttribute('data-sub');
      renderEditSubTabs();
      renderEditBody();
    });
  });
}
function closeEditor(){
  document.getElementById('editModal').classList.remove('open');
  document.body.style.overflow = '';
}

function renderEditTabs(){
  var tb = document.getElementById('editTabs');
  if(!tb) return;
  tb.innerHTML = CASES.map(function(cas,i){
    var label = cas.name.replace('\n',' ');
    var custom = (editedAnsData[i] !== undefined || editedCases[i] !== undefined) ? ' ✎' : '';
    return '<button class="modal-tab'+(i===editCase?' on':'')+'" data-i="'+i+'">'+label+custom+'</button>';
  }).join('');
  tb.querySelectorAll('.modal-tab').forEach(function(b){
    b.addEventListener('click', function(){
      flushEditorValues();
      editCase = parseInt(b.getAttribute('data-i'),10);
      renderEditTabs();
      renderEditBody();
    });
  });
}

      + '<p style="font-size:11px;color:var(--ink3);margin-top:6px">このお客様について過去にどう判断したか・次回の商談で引き継ぎたい経緯などを自由に書き溜められます。受講者画面にも「過去の意思決定」として表示されます。</p></div>'
      + '<p style="font-size:11px;color:var(--ink3);margin-top:8px">スマホ情報・固定回線・特記事項・エリア検索結果は受講者画面の各カードに反映されます。</p>';
    el.innerHTML = html;
    return;
  }

  if(editSubTab === 'quiz'){
    var quizArr = getQuizData(editCase);
    var isCustomQ = editedQuiz !== null;
    if(st){ st.textContent = isCustomQ ? '✎ カスタム編集済み' : 'デフォルト'; st.className = 'edit-stat'+(isCustomQ?' custom':''); }
    var qhtml = '<p style="font-size:11px;color:var(--ink3);margin-bottom:10px">このケースの注意事項クイズを編集します。正解は○/×で選択してください。</p>';
    quizArr.forEach(function(q, qi){
      qhtml += '<div class="edit-quiz-block">'
        + '<div class="edit-row"><div class="ef" style="flex:1"><label>Q'+(qi+1)+'. 問題文</label><textarea id="eq_q'+qi+'" rows="2">'+safeEnc(q.q)+'</textarea></div></div>'
        + '<div class="edit-row">'
        + '<div class="ef" style="max-width:120px"><label>正解</label><select id="eq_a'+qi+'"><option value="true"'+(q.a===true?' selected':'')+'>○</option><option value="false"'+(q.a===false?' selected':'')+'>×</option></select></div>'
        + '<div class="ef" style="flex:2"><label>解説</label><input type="text" id="eq_exp'+qi+'" value="'+safeEnc(q.exp)+'"></div>'
        + '</div>'
        + '<button type="button" class="btn-tiny danger" onclick="removeQuizItem('+qi+')">この問題を削除</button>'
        + '</div>';
    });
    qhtml += '<button type="button" class="btn-tiny" onclick="addQuizItem()" style="margin-top:4px">＋ 問題を追加</button>';
    el.innerHTML = qhtml;
    return;
  }
}

function addAnsPattern(){
  flushEditorValues();
  var cas = getCaseData(editCase);
  var cur_patterns = (editedAnsData[editCase]||{patterns:ANS_DATA[editCase].patterns.slice()}).patterns.slice();
  cur_patterns.push({
    title:'新しいパターン',
    reason:'',
    phones: cas.phones.map(function(){ return {plan:'',min:'',disc:'',saku:''}; }),
    net:{plan:'',fee:'',how:'',saku:''},
    points:''
  });
  if(!editedAnsData[editCase]) editedAnsData[editCase] = {};
  editedAnsData[editCase].patterns = cur_patterns;
  renderEditBody();
}

function removeAnsPattern(idx){
  if(!confirm('このパターンを削除しますか？')) return;
  flushEditorValues();
  var cur_patterns = getAnsPatterns(editCase).slice();
  cur_patterns.splice(idx, 1);
  if(!editedAnsData[editCase]) editedAnsData[editCase] = {};
  editedAnsData[editCase].patterns = cur_patterns;
  renderEditBody();
}

function addQuizItem(){
  flushEditorValues();
  var qa = getQuizData(editCase).slice();
  qa.push({q:'', a:true, exp:''});
  editedQuiz[editCase] = qa;
  renderEditBody();
}
function removeQuizItem(idx){
  flushEditorValues();
  var qa = getQuizData(editCase).slice();
  qa.splice(idx, 1);
  editedQuiz[editCase] = qa;
  renderEditBody();
}

function safeEnc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function safeDec(s){ return s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>'); }

function flushEditorValues(){
  if(editSubTab === 'answer'){
    var basePatterns = getAnsPatterns(editCase);
    var cas = getCaseData(editCase);
    var newPatterns = basePatterns.map(function(pat, pi){
      var np = {
        title: safeDec(val('ep_title'+pi)||pat.title),
        reason: safeDec(val('ep_reason'+pi)||''),
        phones: pat.phones.map(function(ph, j){
          return {
            plan: safeDec(val('ep_p'+pi+'_plan'+j)||''),
            min:  safeDec(val('ep_p'+pi+'_min'+j)||''),
            disc: safeDec(val('ep_p'+pi+'_disc'+j)||''),
            saku: safeDec(val('ep_p'+pi+'_saku'+j)||'')
          };
        }),
        net:{
          plan: safeDec(val('ep_p'+pi+'_net_plan')||''),
          fee:  safeDec(val('ep_p'+pi+'_net_fee')||''),
          how:  safeDec(val('ep_p'+pi+'_net_how')||''),
          saku: safeDec(val('ep_p'+pi+'_net_saku')||'')
        },
        points: safeDec(val('ep_p'+pi+'_points')||'')
      };
      return np;
    });
    if(!editedAnsData[editCase]) editedAnsData[editCase] = {patterns: newPatterns};
    else editedAnsData[editCase].patterns = newPatterns;
  } else if(editSubTab === 'customer'){
    var base = getCaseData(editCase);
    var newCas = JSON.parse(JSON.stringify(base));
    newCas.phones.forEach(function(p, j){
      var who = document.getElementById('ec_who'+j);
      if(!who) return;
      p.who = safeDec(who.value);
      p.label = safeDec(document.getElementById('ec_label'+j).value);
      p.plan = safeDec(document.getElementById('ec_plan'+j).value);
      p.usage = safeDec(document.getElementById('ec_usage'+j).value);
      p.fee = safeDec(document.getElementById('ec_fee'+j).value);
      p.device = safeDec(document.getElementById('ec_device'+j).value);
      p.dfee = safeDec(document.getElementById('ec_dfee'+j).value);
    });
    if(document.getElementById('ec_net_name')){
      newCas.net.name = safeDec(document.getElementById('ec_net_name').value);
      newCas.net.type = safeDec(document.getElementById('ec_net_type').value);
      newCas.net.speed = safeDec(document.getElementById('ec_net_speed').value);
      newCas.net.fee = safeDec(document.getElementById('ec_net_fee').value);
      newCas.net.tel = safeDec(document.getElementById('ec_net_tel').value);
      newCas.net.tv = safeDec(document.getElementById('ec_net_tv').value);
      newCas.net.cost = safeDec(document.getElementById('ec_net_cost').value);
      newCas.net.debt = safeDec(document.getElementById('ec_net_debt').value);
      newCas.net.note = safeDec(document.getElementById('ec_net_note').value);
    }
    if(document.getElementById('ec_special')){
      newCas.special = safeDec(document.getElementById('ec_special').value);
    }
    newCas.area.forEach(function(a, k){
      var lbl = document.getElementById('ec_area_label'+k);
      var val = document.getElementById('ec_area_val'+k);
      if(!lbl || !val) return;
      a[1] = safeDec(lbl.value);
      a[0] = val.value === 'true' ? true : (val.value === 'false' ? false : val.value);
    });
    if(document.getElementById('ec_decisionlog')){
      newCas.decisionLog = safeDec(document.getElementById('ec_decisionlog').value);
    }
    editedCases[editCase] = newCas;
  } else if(editSubTab === 'quiz'){
    var qa = getQuizData(editCase).slice();
    qa = qa.map(function(q, qi){
      var qEl = document.getElementById('eq_q'+qi);
      if(!qEl) return q;
      return {
        q: safeDec(qEl.value),
        a: document.getElementById('eq_a'+qi).value === 'true',
        exp: safeDec(document.getElementById('eq_exp'+qi).value)
      };
    });
    editedQuiz[editCase] = qa;
  }
}

/* ============ 回答まとめ・FB ============ */
function openReport(){
  var jobs = CASES.map(function(_, i){ return loadCase(i); });
  Promise.all(jobs).then(function(){
    document.getElementById('reportBody').innerHTML = buildReportHTML();
    document.getElementById('reportModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  });
}
function closeReport(){
  document.getElementById('reportModal').classList.remove('open');
  document.body.style.overflow = '';
}

function buildReportHTML(){
  var totalCorrect = 0, totalCount = 0, touched = 0;
  var marks = ['①','②','③'];
  var caseHtml = '';

  CASES.forEach(function(_cas0, i){
    var cas = getCaseData(i);
    var d = memCache[i];
    if(!d || !d._touched) return;
    touched++;

    var rows = '';
    cas.phones.forEach(function(p, j){
      var b = d.blocks[j] || {};
      var detail = [];
      if(b.disc) detail.push('割引: ' + esc(b.disc));
      if(b.callop && b.callop !== '（通話なし）') detail.push('通話OP: ' + esc(b.callop) + (b.callfee ? ' ' + b.callfee + '円' : ''));
      if(b.card === 'つけない') detail.push('カード: つけない（' + (b.cardreason ? esc(b.cardreason) : '<span class="empty">理由未記入</span>') + '）');
      else if(b.card && b.card.indexOf('PayPay') === 0) detail.push('カード: ' + esc(b.card) + (b.cardfee ? ' 割引' + b.cardfee + '円' : '') + (b.cardmob ? ' モバイル還元' + b.cardmob + '%' : '') + (b.cardhikari ? ' 光還元' + b.cardhikari + '%' : ''));
      if(b.saku) detail.push('施策: ' + esc(b.saku));
      if(b.mustop) detail.push('必須OP・注意: ' + esc(b.mustop));
      rows += '<tr><td>' + marks[j] + ' ' + p.who + '</td>'
        + '<td>' + (b.plan ? esc(b.plan) : '<span class="empty">未選択</span>') + '</td>'
        + '<td>' + (b.base ? b.base + '円' : '<span class="empty">未入力</span>') + '</td>'
        + '<td>' + (b.min ? b.min + '円' : '<span class="empty">未入力</span>') + '</td>'
        + '<td>' + (detail.length ? detail.join('<br>') : '<span class="empty">—</span>') + '</td></tr>';
    });

    var nb = d.blocks[cas.phones.length] || {};
    var netDetail = [];
    if(nb.how && nb.how !== '（未選択）') netDetail.push('変更方法: ' + esc(nb.how));
    if(nb.kouji && nb.kouji !== '（未選択）'){
      var k = '工事: ' + esc(nb.kouji);
      if(nb.kouji === '工事あり') k += nb.koujifee ? '（' + nb.koujifee + '円）' : '（<span class="empty">工事費未記入</span>）';
      if(nb.kouji === '工事なし') k += nb.koujitype && nb.koujitype !== '（未選択）' ? '（' + esc(nb.koujitype) + '）' : '（<span class="empty">種別未選択</span>）';
      netDetail.push(k);
    }
    if(nb.hoten && nb.hoten !== '（未選択）') netDetail.push('解約金補填: ' + esc(nb.hoten));
    if(nb.sakusel && nb.sakusel !== '（未選択）'){
      var s = '施策: ' + esc(nb.sakusel);
      if(nb.sakusel === 'KD20' || nb.sakusel === 'KD30') s += nb.cbfee ? '（CB ' + nb.cbfee + '円）' : '（<span class="empty">CB未記入</span>）';
      netDetail.push(s);
    }
    rows += '<tr><td>④ 固定回線</td>'
      + '<td>' + (nb.plan ? esc(nb.plan) : '<span class="empty">未選択</span>') + '</td>'
      + '<td>' + (nb.base ? nb.base + '円' : '<span class="empty">—</span>') + '</td>'
      + '<td>' + (nb.min ? nb.min + '円' : '<span class="empty">未入力</span>') + '</td>'
      + '<td>' + (netDetail.length ? netDetail.join('<br>') : '<span class="empty">—</span>') + '</td></tr>';

    var fb = [];
    // 光550円チェック
    if(nb.plan && nb.plan.indexOf('SoftBank光') === 0){
      var base = parseInt(nb.base, 10), min = parseInt(nb.min, 10);
      if(!isNaN(base) && !isNaN(min)){
        if(min === base + 550) fb.push('<span class="fb-ok">✓ 光の月額＝基本料金＋オプションパック550円 になっています</span>');
        else fb.push('<span class="fb-ng">⚠ 光の月額が基本料金＋550円になっていません（基本' + base + '円なら月額' + (base+550) + '円のはず／入力は' + (isNaN(min)?'未入力':min+'円') + '）</span>');
      } else if(!isNaN(base) && isNaN(min)){
        fb.push('<span class="fb-ng">⚠ 光プラン選択時は月額料金（基本料金＋550円）の入力が必要です</span>');
      }
    }
    // CB合計
    if(d.cbtotal) fb.push('CB・還元合計の記入あり: <b>' + d.cbtotal + '円</b>');
    else fb.push('<span class="fb-ng">⚠ CB・還元の合計金額が未記入です</span>');
    // 未選択チェック
    var unselected = [];
    cas.phones.forEach(function(p, j){
      var b = d.blocks[j] || {};
      if(!b.plan || b.plan === '（未選択）') unselected.push(marks[j] + p.who);
    });
    if(!nb.plan || nb.plan === '（未選択）') unselected.push('④固定回線');
    if(unselected.length) fb.push('<span class="fb-ng">⚠ プラン未選択: ' + unselected.join('、') + '</span>');

    // クイズ
    var quiz = d.quiz || [];
    var correct = 0, answered = 0;
    var quizLis = '';
    var QZ = getQuizData(i);
    QZ.forEach(function(q, qi){
      var ansv = quiz[qi];
      if(ansv === 'o' || ansv === 'x'){
        answered++;
        var isCorrect = (ansv === 'o') === q.a;
        if(isCorrect){ correct++; totalCorrect++; }
        totalCount++;
        quizLis += '<li>Q' + (qi+1) + '. ' + q.q + ' → 回答: ' + (ansv==='o'?'○':'×') + ' '
          + (isCorrect ? '<span class="fb-ok">○正解</span>' : '<span class="fb-ng">×不正解 — ' + q.exp + '</span>') + '</li>';
      } else {
        quizLis += '<li>Q' + (qi+1) + '. ' + q.q + ' → <span class="empty">未回答</span></li>';
      }
    });

    caseHtml += '<div class="report-case">'
      + '<h3>' + esc(cas.title) + '</h3>'
      + '<table class="report-table"><tr><th></th><th>プラン・GB数</th><th>基本料金</th><th>最安値/基本料金</th><th>割引・施策・注意</th></tr>' + rows + '</table>'
      + '<div class="report-reason"><b>提案理由メモ：</b>' + (d.reason ? esc(d.reason) : '<span class="empty">未記入</span>') + '</div>'
      + '<div class="report-quiz"><b>注意事項クイズ：正答 ' + correct + ' / ' + answered + '（全' + QZ.length + '問）</b><ul>' + quizLis + '</ul></div>'
      + '<div style="font-size:12px;margin-top:8px"><b>簡易チェック：</b><ul style="padding-left:18px;margin:6px 0">' + fb.map(function(x){ return '<li>' + x + '</li>'; }).join('') + '</ul></div>'
      + '</div>';
  });

  if(touched === 0){
    return '<div class="report-empty">まだ回答が入力されたケースがありません。各ケースで入力すると、ここにまとめが表示されます。</div>';
  }

  var summary = '<div class="report-summary"><h2>総合結果</h2><table>'
    + '<tr><td>取り組んだケース</td><td><b>' + touched + ' / ' + CASES.length + '</b></td></tr>'
    + '<tr><td>注意事項クイズ正答率</td><td><b>' + totalCorrect + ' / ' + totalCount + (totalCount ? '（' + Math.round(totalCorrect/totalCount*100) + '%）' : '') + '</b></td></tr>'
    + '</table>'
    + '</div>';

  return summary + caseHtml;
}

function saveEdits(){
  flushEditorValues();
  closeEditor();
  buildSidebar();
  if(cur === editCase){
    loadCase(cur).then(function(saved){ buildMain(saved); });
  }
}

function exportEdits(){
  flushEditorValues();
  var payload = {
    ansData: editedAnsData,
    cases: editedCases,
    quiz: editedQuiz,
    exportedAt: new Date().toLocaleString('ja-JP')
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = '乗り換えサイト編集データ.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function importEditsFile(input){
  var file = input.files && input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(data.ansData) Object.assign(editedAnsData, data.ansData);
      if(data.cases) Object.assign(editedCases, data.cases);
      if(data.quiz) Object.assign(editedQuiz, data.quiz);
      alert('編集データを読み込みました（' + (data.exportedAt||'') + ' 書き出し分）');
      renderEditTabs();
      renderEditBody();
      buildSidebar();
      if(cur >= 0) loadCase(cur).then(function(saved){ buildMain(saved); });
    }catch(err){
      alert('読み込みに失敗しました。正しいJSONファイルか確認してください。');
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function resetEdit(){
  if(editSubTab === 'answer'){
    if(!confirm('このケースの解答パターンをデフォルトに戻しますか？')) return;
    delete editedAnsData[editCase];
  } else if(editSubTab === 'customer'){
    if(!confirm('このケースの顧客設定をデフォルトに戻しますか？')) return;
    delete editedCases[editCase];
  } else if(editSubTab === 'quiz'){
    if(!confirm('このケースの注意事項クイズをデフォルトに戻しますか？')) return;
    delete editedQuiz[editCase];
  }
  renderEditBody();
  renderEditTabs();
}


/* ============ 起動：保存データを順次読み込み ============ */
function preloadAll(){
  var jobs = CASES.map(function(_, i){ return loadCase(i); });
  Promise.all(jobs).then(function(){
    return storageOK ? loadAllEdits() : Promise.resolve();
  }).then(function(){
    buildSidebar();
    selectCase(0);
  });
}
preloadAll();
